name: Build Thataflix Theme

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout jellyfin-web
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-web
          path: jellyfin-web

      - name: Checkout Thataflix
        uses: actions/checkout@v4
        with:
          path: thataflix

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./jellyfin-web
        run: npm ci

      - name: Symlink Thataflix theme
        working-directory: ./jellyfin-web
        run: |
          ln -sf $(pwd)/../thataflix/src/themes/thataflix src/themes/thataflix

      - name: Register theme
        working-directory: ./jellyfin-web
        run: |
          # Add import and registration to index.ts
          sed -i "s/import wmc from '.\/wmc';/import wmc from '.\/wmc';\nimport thataflix from '.\/thataflix';/" src/themes/index.ts
          sed -i "s/\/\/ ... existing themes .../\/\/ ... existing themes ...\n        thataflix,/" src/themes/index.ts

      - name: Build production
        working-directory: ./jellyfin-web
        run: npm run build:production

      - name: Upload theme artifact
        uses: actions/upload-artifact@v4
        with:
          name: thataflix-theme
          path: |
            jellyfin-web/dist/themes/thataflix/
            jellyfin-web/dist/fonts/
